name: Publicar release

# Dispara quando uma tag v* e enviada e cria o release automaticamente,
# usando o GITHUB_TOKEN nativo do Actions (nao precisa de token pessoal).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Criar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }} — Painel de Consumo do Claude" \
            --notes "$(cat <<'EOF'
          Painel local de consumo do Claude Code com **interface Cupertino (iOS)**.

          Mostra o total de tokens da vida toda, médias por hora (geral/mês/semana/dia),
          os limites ao vivo da conta (sessão 5h, semana 7d, Sonnet 7d) com semáforo de
          risco e projeção até o reset, e um veredito direto de **troca de modelo**.

          - Frontend: React + Vite + Konsta UI (tema iOS) + Tailwind v4 + Chart.js
          - Backend: Python (stdlib) servindo o build + API de uso da conta
          - Roda em localhost; para usar basta `python main.py` (a UI já vem compilada)

          Instalação e detalhes no [README](https://github.com/eueduardocampos/claude-usage#readme).

          Projeto pessoal e não-oficial — sem relação com a Anthropic.
          EOF
          )"
