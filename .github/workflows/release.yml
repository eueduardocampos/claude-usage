name: Publicar release

# Dispara quando uma tag v* e enviada. Builda o app de desktop (Tauri) para
# macOS (universal), Windows e Linux em runners nativos e anexa os instaladores
# ao release como rascunho. Roda em paralelo (matriz); cada job sobe seus
# artefatos no mesmo release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias do sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache do Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Build + anexar ao release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }} — Consumo do Claude (desktop)'
          releaseBody: |
            Widget flutuante de consumo do Claude para **macOS, Windows e Linux**.

            O app e a moldura nativa: ele exibe o painel servido em `localhost:8090`,
            entao o painel (`python main.py`) precisa estar rodando. Instalacao e
            detalhes por sistema no [README](https://github.com/eueduardocampos/claude-usage#readme).

            Baixe o instalador do seu sistema abaixo:
            - **macOS**: `.dmg` (universal — Intel e Apple Silicon)
            - **Windows**: `.msi` ou `.exe`
            - **Linux**: `.AppImage`, `.deb` ou `.rpm`

            Apps nao assinados: na primeira execucao pode ser necessario liberar no
            Gatekeeper (macOS, botao direito > Abrir) ou no SmartScreen (Windows).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
